<div class="flex flex-col gap-5 h-full">
  <h1 class="w-full text-4xl font-bold text-center my-2">Todos los eventos</h1>

  <div class="flex flex-wrap justify-around content-start flex-1">
    @defer (when events().length) {
      @for (event of events(); track event.id) {
        <event-card [event]="event" (cardTap)="onCardTap(event.id)" />
      }
    }
    @loading {
      <h2>loading...</h2>
    }
  </div>
</div>
