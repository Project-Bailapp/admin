<section class="flex flex-wrap justify-around content-start h-full">
  <h1 class="w-full text-4xl font-bold text-center my-2">Todos los eventos</h1>

  @defer (when events().length) {
    @for (event of events(); track event.id) { <event-card [event]="event" /> }
  }
  @loading {
    <h1>loading...</h1>
  }
</section>
